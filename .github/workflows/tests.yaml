name: Test RAMSES


on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:

    run:
        name: "Tests ${{ matrix.test-family }}"
        if: ${{ github.event.label.name == 'run tests' }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                test-family: [hydro,mhd,poisson,rt,sink,turb,tracer]
        steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        - name: Install OpenMPI and FFTW
          run: sudo apt-get install -y openmpi-bin libopenmpi-dev libfftw3-bin libfftw3-dev
        - name: Setup python
          uses: actions/setup-python@v5
          with:
            python-version: '3.13'
            cache: 'pip' # caching pip dependencies
        - name: Install python dependencies
          run: pip install -r .github/workflows/requirements.txt
        - name: Setup tectonic
          uses: wtfjoke/setup-tectonic@v3
          with:
            tectonic-version: 0.15.0
        - name: "Run tests ${{ matrix.test-family }}"
          run: |
            cd tests
            bash run_test_suite.sh -p 2 -v -t ${{ matrix.test-family }}
        - name: "Upload artifacts  ${{ matrix.test-family }}"
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: "test-results ${{ matrix.test-family }}"
            path: |
              tests/test_results.pdf
              tests/test_suite.log
